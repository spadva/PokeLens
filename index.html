<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéLens – Card Value Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0eeff;
  --muted: rgba(240,238,255,0.5);
  --dim: rgba(240,238,255,0.25);
  --accent: #c8b8ff;
  --accent2: #8b5cf6;
  --gold: #f4c94e;
  --gold2: #e8a012;
  --teal: #4eebc8;
  --red: #ff6b6b;
  --green: #4ee897;
  --mono: 'Space Mono', monospace;
  --head: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(139,92,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, rgba(139,92,246,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 540px;
  padding: 2rem 1.25rem 4rem;
}
header {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 1.5rem;
}
.logo {
  font-family: var(--head);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.logo-sub {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.version-badge {
  margin-left: auto;
  font-size: 10px;
  color: var(--dim);
  border: 1px solid var(--border2);
  border-radius: 99px;
  padding: 3px 10px;
  letter-spacing: 0.1em;
}
.nav-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
}
.nav-tab {
  flex: 1;
  padding: 8px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.nav-tab.active {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 20px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  letter-spacing: 0.02em;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(0.98); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent2), #7c3aed);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 4px 24px rgba(139,92,246,0.35);
}
.btn-secondary {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { color: var(--text); border-color: var(--accent2); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  color: #1a1000;
  font-weight: 700;
  box-shadow: 0 4px 24px rgba(244,201,78,0.25);
}
.btn-save {
  background: linear-gradient(135deg, rgba(78,232,151,0.15), rgba(78,232,151,0.05));
  border: 1px solid rgba(78,232,151,0.4);
  color: var(--green);
  font-family: var(--mono);
  font-size: 14px;
  padding: 13px;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.btn-save:hover { background: rgba(78,232,151,0.2); }
.btn-save.saved { opacity: 0.5; cursor: default; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
.btn-row .btn-primary { flex: 2; }
.camera-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 4/3;
  background: #000;
  margin-bottom: 1rem;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
.camera-frame {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 55%; aspect-ratio: 2.5/3.5;
  border: 2px solid rgba(200,184,255,0.7);
  border-radius: 6px;
  pointer-events: none;
}
.camera-frame::before, .camera-frame::after,
.camera-frame-b::before, .camera-frame-b::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--accent);
  border-style: solid;
}
.camera-frame::before { top:-2px; left:-2px; border-width:3px 0 0 3px; border-radius:2px 0 0 0; }
.camera-frame::after  { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 2px 0 0; }
.camera-frame-b { position:absolute; inset:0; pointer-events:none; }
.camera-frame-b::before { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 2px; }
.camera-frame-b::after  { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 2px 0; }
.camera-hint {
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
@keyframes scanline { 0% { top:0; } 100% { top:100%; } }
.scanline {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(transparent, rgba(200,184,255,0.5), transparent);
  animation: scanline 2s linear infinite;
  pointer-events: none;
}
.preview-img {
  width: 100%;
  border-radius: 12px;
  display: block;
  margin-bottom: 1rem;
  border: 1px solid var(--border2);
}
.loading-center { text-align: center; padding: 3rem 1rem; }
.pokeball {
  display: inline-block;
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  position: relative;
  animation: spin 1.2s linear infinite;
  margin-bottom: 1.5rem;
}
.pokeball::before {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0; height: 1px;
  background: var(--accent);
  transform: translateY(-50%);
}
.pokeball::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent2);
  border: 2px solid var(--accent);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-family: var(--head); font-size: 18px; margin-bottom: 6px; }
.loading-sub { font-size: 12px; color: var(--dim); letter-spacing: 0.08em; }
.error-box {
  background: rgba(255,107,107,0.08);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: 10px;
  padding: 1rem;
  font-size: 13px;
  color: #ff9090;
  margin-bottom: 1rem;
  line-height: 1.6;
}
.section-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.card-identity {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 1.25rem;
}
.card-name {
  font-family: var(--head);
  font-size: 26px;
  font-weight: 800;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card-meta { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.7; }
.rarity-badge {
  flex-shrink: 0;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 99px;
  font-weight: 700;
  background: linear-gradient(135deg, rgba(244,201,78,0.15), rgba(232,160,18,0.1));
  border: 1px solid rgba(244,201,78,0.4);
  color: var(--gold);
  white-space: nowrap;
}
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  color: var(--muted);
  letter-spacing: 0.05em;
}
.grade-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.grade-label { font-family: var(--head); font-size: 20px; font-weight: 700; }
.grade-score {
  font-size: 13px;
  font-family: var(--mono);
  padding: 4px 12px;
  border-radius: 99px;
  font-weight: 700;
}
.bar-bg { height: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; margin-bottom: 12px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.16,1,.3,1); }
.grade-details { font-size: 13px; color: var(--muted); line-height: 1.7; }
.value-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.value-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.value-cell-label { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.value-cell-num { font-family: var(--head); font-size: 20px; font-weight: 700; }
.value-cell.mid { border-color: rgba(244,201,78,0.3); background: rgba(244,201,78,0.05); }
.value-cell.mid .value-cell-num { color: var(--gold); }
.value-basis { font-size: 12px; color: var(--dim); line-height: 1.6; }
.tip-box {
  background: rgba(78,235,200,0.06);
  border: 1px solid rgba(78,235,200,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--teal);
  line-height: 1.6;
  display: flex;
  gap: 10px;
}
.tip-icon { flex-shrink: 0; font-size: 16px; }
.search-links { display: flex; flex-direction: column; gap: 8px; }
.search-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 13px;
  text-decoration: none;
  transition: all 0.15s;
}
.search-link:hover { border-color: var(--border2); color: var(--text); transform: translateX(2px); }
.search-link-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.search-link-text { flex: 1; }
.search-link-label { font-size: 11px; color: var(--dim); margin-bottom: 1px; letter-spacing: 0.05em; }
.search-link-title { font-size: 13px; }
.search-link-arrow { color: var(--dim); font-size: 12px; flex-shrink: 0; }
.thumb-row {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 12px;
  background: var(--surface2);
  border-radius: 10px;
  border: 1px solid var(--border);
}
.thumb-img { width: 38px; height: 53px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border2); flex-shrink: 0; }
.thumb-text { font-size: 11px; color: var(--dim); line-height: 1.6; }
.idle-hint {
  display: flex;
  gap: 10px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--dim);
  line-height: 1.6;
  border: 1px solid var(--border);
}
.result-stack { display: flex; flex-direction: column; gap: 12px; }
/* collection */
.total-value-box {
  background: linear-gradient(135deg, rgba(244,201,78,0.1), rgba(232,160,18,0.05));
  border: 1px solid rgba(244,201,78,0.3);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  text-align: center;
  margin-bottom: 1rem;
}
.total-value-label { font-size: 11px; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
.total-value-num { font-family: var(--head); font-size: 36px; font-weight: 800; color: var(--gold); }
.total-value-sub { font-size: 12px; color: var(--dim); margin-top: 4px; }
.collection-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.stat-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
.stat-num { font-family: var(--head); font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.collection-list { display: flex; flex-direction: column; gap: 8px; }
.collection-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  transition: border-color 0.15s;
  cursor: pointer;
}
.collection-item:hover { border-color: var(--border2); }
.collection-item-thumb { width: 34px; height: 47px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border2); flex-shrink: 0; background: var(--surface2); }
.collection-item-info { flex: 1; min-width: 0; }
.collection-item-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.collection-item-meta { font-size: 11px; color: var(--dim); margin-top: 2px; }
.collection-item-value { font-family: var(--head); font-size: 15px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
.collection-item-delete { background: none; border: none; color: var(--dim); font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0; }
.collection-item-delete:hover { color: var(--red); }
.empty-collection { text-align: center; padding: 3rem 1rem; color: var(--dim); font-size: 13px; line-height: 1.8; }
.chart-wrap { height: 260px; margin-bottom: 1rem; position: relative; }
/* modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 9999;
  overflow-y: auto;
  padding: 2rem 1rem;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 1.5rem;
  width: 100%;
  max-width: 480px;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 24px;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }
.field-group { margin-bottom: 1rem; }
.field-label { font-size: 11px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
}
.field-input:focus { outline: none; border-color: var(--accent2); }
@media (max-width: 420px) {
  .card-name { font-size: 22px; }
  .value-cell-num { font-size: 17px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">PokéLens</div>
      <div class="logo-sub">TCG Card Checker</div>
    </div>
    <div class="version-badge">AI-POWERED</div>
  </header>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-scanner" onclick="switchTab('scanner')">🔍 Scanner</button>
    <button class="nav-tab" id="tab-collection" onclick="switchTab('collection')">📦 Collection <span id="collection-count"></span></button>
  </div>
  <div id="root"></div>
  <div id="collection-root" style="display:none"></div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const root = document.getElementById('root');
let appState = { mode: 'idle', imageSrc: null, result: null, error: null };
let cameraStream = null;

let collection = JSON.parse(localStorage.getItem('pokelens_collection') || '[]');
let portfolioHistory = JSON.parse(localStorage.getItem('pokelens_portfolio_history') || '[]');

let pieChartInstance = null;
let lineChartInstance = null;
let trendChartInstance = null;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const GRADE_COLORS = {
  'Mint':      { label:'#4ee897', bar:'#4ee897', score:'rgba(78,232,151,0.15)', scoreText:'#4ee897' },
  'Near Mint': { label:'#4eebc8', bar:'#4eebc8', score:'rgba(78,235,200,0.15)', scoreText:'#4eebc8' },
  'Excellent': { label:'#c8b8ff', bar:'#c8b8ff', score:'rgba(200,184,255,0.15)', scoreText:'#c8b8ff' },
  'Good':      { label:'#f4c94e', bar:'#f4c94e', score:'rgba(244,201,78,0.15)', scoreText:'#f4c94e' },
  'Played':    { label:'#ff9f4a', bar:'#ff9f4a', score:'rgba(255,159,74,0.15)', scoreText:'#ff9f4a' },
  'Poor':      { label:'#ff6b6b', bar:'#ff6b6b', score:'rgba(255,107,107,0.15)', scoreText:'#ff6b6b' },
};
const RARITY_ICONS = {
  'Common':'◉','Uncommon':'◆','Rare':'★','Rare Holo':'★',
  'Ultra Rare':'◈','Secret Rare':'◈','Special Illustration Rare':'◈','Special':'◈'
};

// ─── SCANNER RENDER ───────────────────────────────────────────────────────────
function render() {
  const { mode, imageSrc, result, error } = appState;
  if      (mode === 'idle')    renderIdle();
  else if (mode === 'camera')  renderCamera();
  else if (mode === 'preview') renderPreview(imageSrc);
  else if (mode === 'loading') renderLoading();
  else if (mode === 'error')   renderError(error);
  else if (mode === 'result')  renderResult(result, imageSrc);
}

function renderIdle() {
  root.innerHTML = `
    <div class="panel">
      <div id="drop-zone" style="border:2px dashed var(--border2);border-radius:14px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;background:var(--surface2);">
        <div style="font-size:40px;margin-bottom:12px;line-height:1">🃏</div>
        <div style="font-family:var(--head);font-size:17px;font-weight:600;margin-bottom:6px">Drop card image here</div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:16px;line-height:1.6">
          Drag &amp; drop · Click to browse · Paste <kbd style="background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-size:11px">⌘V</kbd>
        </div>
        <button class="btn btn-primary" id="btn-browse" style="width:auto;padding:10px 24px;display:inline-flex">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Choose file
        </button>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>
      <button class="btn btn-secondary" id="btn-camera" style="margin-bottom:12px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Use Camera (mobile)
      </button>
      <div class="idle-hint">
        <span style="font-size:15px;flex-shrink:0">💡</span>
        <span>On Mac: drag an image in, click to browse, or press <strong>⌘V</strong> to paste a screenshot.</span>
      </div>
    </div>`;

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  document.getElementById('btn-browse').onclick = function(e) { e.stopPropagation(); fileInput.click(); };
  dropZone.onclick = function() { fileInput.click(); };
  document.getElementById('btn-camera').onclick = startCamera;
  fileInput.onchange = handleFile;

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.style.borderColor = 'var(--accent2)';
    dropZone.style.background = 'rgba(139,92,246,0.08)';
  });
  dropZone.addEventListener('dragleave', function() {
    dropZone.style.borderColor = 'var(--border2)';
    dropZone.style.background = 'var(--surface2)';
  });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    var file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  document.onpaste = function(e) {
    var items = e.clipboardData ? e.clipboardData.items : [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.startsWith('image/')) {
        loadFile(items[i].getAsFile());
        break;
      }
    }
  };
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } } });
  } catch(e) {
    try { cameraStream = await navigator.mediaDevices.getUserMedia({ video: true }); }
    catch(e2) {
      appState.error = 'Camera access denied. Allow permissions or upload an image instead.';
      appState.mode = 'error';
      return render();
    }
  }
  appState.mode = 'camera';
  render();
}

function capturePhoto() {
  var video = document.getElementById('video');
  if (!video) return;
  var canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  appState.imageSrc = canvas.toDataURL('image/jpeg', 0.92);
  stopStream();
  appState.mode = 'preview';
  render();
}

function loadFile(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    appState.imageSrc = ev.target.result;
    appState.mode = 'preview';
    render();
  };
  reader.readAsDataURL(file);
}

function handleFile(e) {
  var file = e.target.files[0];
  if (file) loadFile(file);
}

function stopStream() {
  if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); cameraStream = null; }
}

function resetApp() {
  stopStream();
  appState = { mode: 'idle', imageSrc: null, result: null, error: null };
  render();
}

// ─── AI ANALYSIS ──────────────────────────────────────────────────────────────
async function analyzeCard() {
  if (!appState.imageSrc) return;
  appState.mode = 'loading';
  render();

  var base64Data = appState.imageSrc.split(',')[1];
  var mediaType  = appState.imageSrc.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';

  var SYSTEM = 'You are an expert Pokémon TCG card appraiser. You identify cards from images and look up their real current market prices using web search.\n\n' +
    'READING THE CARD:\n' +
    '1. Name — large text top-left\n' +
    '2. HP — number top-right\n' +
    '3. Card number — bottom, format NNN/TTT. If first > second = Secret/Special Rare\n' +
    '4. Set name — bottom near card number\n' +
    '5. Rarity — star=Rare, 2 stars=Ultra Rare, 3 stars/crown=Special Illustration Rare\n' +
    '6. Type — fire/water/grass/lightning/psychic/fighting/darkness/metal/colorless\n' +
    '7. ex(lowercase)=2023+, EX(caps)=XY era, GX=Sun&Moon, V/VMAX/VSTAR=Sword&Shield\n\n' +
    'REFERENCE: Mega Charizard X ex | 125/094 | Phantasmal Flames | 2025 | Special Illustration Rare | Fire | 360HP\n\n' +
    'PRICING: Use web_search to find CURRENT market prices. Search "[card name] [set] [number] price tcgplayer" and "[card name] [set] sold ebay 2025". Use actual prices found.\n\n' +
    'CONFIDENCE: High=clearly readable, Medium=partial, Low=inferred from artwork only\n\n' +
    'Respond with ONLY raw JSON, no markdown, no backticks:\n' +
    '{"found":true,"name":"full name with suffix","set":"exact set name","setNumber":"NNN/TTT","year":"year","rarity":"Common|Uncommon|Rare|Rare Holo|Ultra Rare|Secret Rare|Special Illustration Rare","type":"Fire|Water|Grass|Lightning|Psychic|Fighting|Darkness|Metal|Colorless","hp":"HP number","grade":"Mint|Near Mint|Excellent|Good|Played|Poor","gradeDetails":"2-3 sentences on condition","gradeScore":8,"estimatedValue":{"low":10,"mid":25,"high":40},"valueBasis":"cite actual prices found","tips":"one actionable tip","confidence":"High|Medium|Low"}\n' +
    'If no card: {"found":false,"reason":"..."}';

  var USER_TEXT = 'Identify this Pokémon card from the image. Read the name, HP, card number and set directly from the card. Then search the web for its current market price. Return only the JSON.';

  try {
    var response = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: SYSTEM,
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: USER_TEXT },
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64Data } }
          ]
        }]
      })
    });

    var data = await response.json();
    console.log('API response status:', data.type);

    if (data.error) {
      appState.error = 'API error: ' + data.error.type + ' — ' + data.error.message;
      appState.mode = 'error';
      render();
      return;
    }

    var text = (data.content || []).map(function(b) { return b.text || ''; }).filter(Boolean).join('');
    console.log('Raw text:', text.slice(0, 200));

    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      appState.error = 'Unexpected response: ' + text.slice(0, 200);
      appState.mode = 'error';
      render();
      return;
    }

    var parsed;
    try { parsed = JSON.parse(jsonMatch[0]); }
    catch(pe) {
      appState.error = 'Parse error: ' + jsonMatch[0].slice(0, 150);
      appState.mode = 'error';
      render();
      return;
    }

    if (!parsed.found) {
      appState.error = parsed.reason || 'No Pokémon card detected. Try a clearer photo.';
      appState.mode = 'error';
    } else {
      appState.result = parsed;
      appState.mode = 'result';
    }
  } catch(e) {
    console.error('Fetch error:', e);
    appState.error = 'Network error: ' + e.message;
    appState.mode = 'error';
  }
  render();
}

// ─── COLLECTION STORAGE ───────────────────────────────────────────────────────
function saveCollection() {
  localStorage.setItem('pokelens_collection', JSON.stringify(collection));
  updateCollectionCount();
}

function updatePortfolioHistory() {
  var total = collection.reduce(function(sum, c) { return sum + Number(c.customValue || 0); }, 0);
  portfolioHistory.push({ date: new Date().toLocaleDateString(), value: total });
  if (portfolioHistory.length > 90) portfolioHistory.shift();
  localStorage.setItem('pokelens_portfolio_history', JSON.stringify(portfolioHistory));
}

function saveToCollection(card, img) {
  var value = Number(card.estimatedValue && card.estimatedValue.mid || 0);
  collection.unshift({
    id: Date.now(),
    name: card.name,
    set: card.set,
    setNumber: card.setNumber,
    rarity: card.rarity,
    grade: card.grade,
    customGrade: card.grade,
    value: value,
    customValue: value,
    valueLow: Number(card.estimatedValue && card.estimatedValue.low || 0),
    valueHigh: Number(card.estimatedValue && card.estimatedValue.high || 0),
    thumb: img,
    notes: '',
    addedAt: new Date().toLocaleDateString(),
    priceHistory: [{ date: new Date().toLocaleDateString(), value: value }]
  });
  updatePortfolioHistory();
  saveCollection();
}

function removeFromCollection(id) {
  collection = collection.filter(function(c) { return c.id !== id; });
  saveCollection();
  renderCollection();
}

function isInCollection(r) {
  return collection.some(function(c) { return c.name === r.name && c.set === r.set && c.setNumber === r.setNumber; });
}

function updateCollectionCount() {
  var el = document.getElementById('collection-count');
  if (el) el.textContent = collection.length > 0 ? '(' + collection.length + ')' : '';
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab) {
  var scanner = document.getElementById('root');
  var collView = document.getElementById('collection-root');
  var tabS = document.getElementById('tab-scanner');
  var tabC = document.getElementById('tab-collection');
  if (tab === 'scanner') {
    scanner.style.display = '';
    collView.style.display = 'none';
    tabS.classList.add('active');
    tabC.classList.remove('active');
  } else {
    scanner.style.display = 'none';
    collView.style.display = '';
    tabS.classList.remove('active');
    tabC.classList.add('active');
    renderCollection();
  }
}

// ─── COLLECTION RENDER ────────────────────────────────────────────────────────
function renderCollection() {
  var el = document.getElementById('collection-root');
  if (!el) return;

  var total     = collection.reduce(function(s, c) { return s + Number(c.customValue || 0); }, 0);
  var totalLow  = collection.reduce(function(s, c) { return s + Number(c.valueLow || 0); }, 0);
  var totalHigh = collection.reduce(function(s, c) { return s + Number(c.valueHigh || 0); }, 0);
  var topCard   = collection.length ? collection.slice().sort(function(a,b){ return b.customValue - a.customValue; })[0] : null;
  var avgValue  = collection.length ? (total / collection.length).toFixed(2) : '0.00';

  var listHTML = '';
  if (collection.length === 0) {
    listHTML = '<div class="empty-collection"><div style="font-size:40px;margin-bottom:12px">📦</div>No cards yet.<br>Scan a card and tap<br><strong>Save to Collection</strong>.</div>';
  } else {
    listHTML = '<div class="collection-list">' +
      collection.map(function(card) {
        return '<div class="collection-item" onclick="openCardModal(' + card.id + ')">' +
          (card.thumb ? '<img class="collection-item-thumb" src="' + card.thumb + '" alt="' + card.name + '">' : '<div class="collection-item-thumb"></div>') +
          '<div class="collection-item-info">' +
            '<div class="collection-item-name">' + card.name + '</div>' +
            '<div class="collection-item-meta">' + (card.set || '') + ' · ' + (card.customGrade || card.grade || '') + ' · ' + (card.addedAt || '') + '</div>' +
          '</div>' +
          '<div class="collection-item-value">$' + Number(card.customValue).toFixed(2) + '</div>' +
          '<button class="collection-item-delete" onclick="event.stopPropagation();removeFromCollection(' + card.id + ')">✕</button>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  el.innerHTML =
    '<div class="total-value-box">' +
      '<div class="total-value-label">Total Collection Value</div>' +
      '<div class="total-value-num">$' + total.toFixed(2) + '</div>' +
      '<div class="total-value-sub">Range: $' + totalLow.toFixed(2) + ' – $' + totalHigh.toFixed(2) + '</div>' +
    '</div>' +
    '<div class="collection-stats">' +
      '<div class="stat-cell"><div class="stat-num">' + collection.length + '</div><div class="stat-label">Cards</div></div>' +
      '<div class="stat-cell"><div class="stat-num">$' + avgValue + '</div><div class="stat-label">Avg Value</div></div>' +
      '<div class="stat-cell"><div class="stat-num" style="font-size:12px;margin-top:2px">' + (topCard ? topCard.name.split(' ').slice(0,2).join(' ') : '—') + '</div><div class="stat-label">Top Card</div></div>' +
    '</div>' +
    (collection.length > 0 ?
      '<div class="panel" style="margin-bottom:1rem">' +
        '<div class="section-label" style="margin-bottom:12px">Portfolio breakdown</div>' +
        '<div class="chart-wrap"><canvas id="pieChart"></canvas></div>' +
      '</div>' +
      '<div class="panel" style="margin-bottom:1rem">' +
        '<div class="section-label" style="margin-bottom:12px">Portfolio value over time</div>' +
        '<div class="chart-wrap"><canvas id="lineChart"></canvas></div>' +
      '</div>'
    : '') +
    listHTML;

  if (collection.length > 0) {
    renderCharts();
  }
}

function renderCharts() {
  // destroy old instances
  if (pieChartInstance)  { pieChartInstance.destroy();  pieChartInstance  = null; }
  if (lineChartInstance) { lineChartInstance.destroy(); lineChartInstance = null; }

  var pieCanvas  = document.getElementById('pieChart');
  var lineCanvas = document.getElementById('lineChart');

  if (pieCanvas && collection.length > 0) {
    pieChartInstance = new Chart(pieCanvas, {
      type: 'pie',
      data: {
        labels: collection.map(function(c) { return c.name; }),
        datasets: [{
          data: collection.map(function(c) { return Number(c.customValue || 0); }),
          backgroundColor: ['#8b5cf6','#f4c94e','#4eebc8','#ff6b6b','#4ee897','#c8b8ff','#ff9f4a','#378ADD','#E24B4A','#1D9E75']
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { labels: { color: '#f0eeff', font: { family: 'Space Mono' } } }
        }
      }
    });
  }

  if (lineCanvas && portfolioHistory.length > 0) {
    lineChartInstance = new Chart(lineCanvas, {
      type: 'line',
      data: {
        labels: portfolioHistory.map(function(h) { return h.date; }),
        datasets: [{
          label: 'Collection Value ($)',
          data: portfolioHistory.map(function(h) { return h.value; }),
          borderColor: '#8b5cf6',
          backgroundColor: 'rgba(139,92,246,0.1)',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          x: { ticks: { color: '#f0eeff', font: { family: 'Space Mono', size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { ticks: { color: '#f0eeff', font: { family: 'Space Mono', size: 10 }, callback: function(v) { return '$' + v; } }, grid: { color: 'rgba(255,255,255,0.05)' } }
        },
        plugins: { legend: { labels: { color: '#f0eeff', font: { family: 'Space Mono' } } } }
      }
    });
  }
}

// ─── CARD DETAIL MODAL ────────────────────────────────────────────────────────
function openCardModal(id) {
  var card = collection.find(function(c) { return c.id === id; });
  if (!card) return;

  var existing = document.getElementById('card-modal');
  if (existing) existing.remove();
  if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }

  var modal = document.createElement('div');
  modal.id = 'card-modal';
  modal.className = 'modal-overlay';
  modal.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-header">' +
        '<div style="font-family:var(--head);font-size:18px;font-weight:700">' + card.name + '</div>' +
        '<button class="modal-close" onclick="closeCardModal()">✕</button>' +
      '</div>' +
      (card.thumb ? '<img src="' + card.thumb + '" style="width:120px;border-radius:10px;margin-bottom:1rem;border:1px solid var(--border2)">' : '') +
      '<div class="card-meta" style="margin-bottom:1rem">' + [card.set, card.setNumber, card.rarity].filter(Boolean).join(' · ') + '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Grade</div>' +
        '<select id="edit-grade" class="field-input">' +
          ['Mint','Near Mint','Excellent','Good','Played','Poor'].map(function(g) {
            return '<option value="' + g + '"' + (card.customGrade === g ? ' selected' : '') + '>' + g + '</option>';
          }).join('') +
        '</select>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Current Value (USD)</div>' +
        '<input id="edit-value" class="field-input" type="number" step="0.01" value="' + Number(card.customValue).toFixed(2) + '">' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Notes</div>' +
        '<input id="edit-notes" class="field-input" type="text" value="' + (card.notes || '') + '" placeholder="e.g. bought at local card shop">' +
      '</div>' +
      '<div class="section-label" style="margin-bottom:10px;margin-top:1rem">Price history</div>' +
      '<div class="chart-wrap"><canvas id="trendChart"></canvas></div>' +
      '<div style="display:flex;gap:10px;margin-top:1rem">' +
        '<button class="btn btn-secondary" onclick="closeCardModal()" style="flex:1">Cancel</button>' +
        '<button class="btn btn-primary" onclick="saveCardEdits(' + card.id + ')" style="flex:2">Save Changes</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(modal);
  modal.onclick = function(e) { if (e.target === modal) closeCardModal(); };

  setTimeout(function() { renderTrendChart(card); }, 100);
}

function closeCardModal() {
  var modal = document.getElementById('card-modal');
  if (modal) modal.remove();
  if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }
}

function saveCardEdits(id) {
  var card = collection.find(function(c) { return c.id === id; });
  if (!card) return;
  var newValue = Number(document.getElementById('edit-value').value || 0);
  card.customGrade = document.getElementById('edit-grade').value;
  card.customValue = newValue;
  card.notes = document.getElementById('edit-notes').value;
  card.priceHistory = card.priceHistory || [];
  card.priceHistory.push({ date: new Date().toLocaleDateString(), value: newValue });
  saveCollection();
  updatePortfolioHistory();
  closeCardModal();
  renderCollection();
}

function renderTrendChart(card) {
  if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }
  var canvas = document.getElementById('trendChart');
  if (!canvas) return;
  var history = card.priceHistory && card.priceHistory.length > 0
    ? card.priceHistory
    : [{ date: card.addedAt || 'Today', value: Number(card.customValue || 0) }];
  trendChartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels: history.map(function(p) { return p.date; }),
      datasets: [{
        label: card.name + ' Value ($)',
        data: history.map(function(p) { return p.value; }),
        borderColor: '#f4c94e',
        backgroundColor: 'rgba(244,201,78,0.1)',
        tension: 0.3,
        fill: true,
        pointRadius: 5,
        pointBackgroundColor: '#f4c94e'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        x: { ticks: { color: '#f0eeff', font: { family: 'Space Mono', size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#f0eeff', font: { family: 'Space Mono', size: 10 }, callback: function(v) { return '$' + v; } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      },
      plugins: { legend: { labels: { color: '#f0eeff', font: { family: 'Space Mono' } } } }
    }
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateCollectionCount();
render();
</script>
</body>
</html>
