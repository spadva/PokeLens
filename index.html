<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

const root = document.getElementById('root');

let state = {
  mode: 'idle',
  imageSrc: null,
  result: null,
  error: null
};

let stream = null;

let collection = JSON.parse(
  localStorage.getItem('pokelens_collection') || '[]'
);

let portfolioHistory = JSON.parse(
  localStorage.getItem('pokelens_portfolio_history') || '[]'
);

// ─────────────────────────────────────────────
// APP START
// ─────────────────────────────────────────────

updateCollectionCount();
render();

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────

function render() {

  const { mode } = state;

  if (mode === 'idle') {
    renderIdle();
  }

  if (mode === 'preview') {
    renderPreview();
  }

  if (mode === 'loading') {
    renderLoading();
  }

  if (mode === 'result') {
    renderResult();
  }

  if (mode === 'error') {
    renderError();
  }
}

// ─────────────────────────────────────────────
// IDLE
// ─────────────────────────────────────────────

function renderIdle() {

  root.innerHTML = `
    <div class="panel">

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        style="display:none"
      >

      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
        Upload Card
      </button>

      <div style="height:12px"></div>

      <button class="btn btn-secondary" onclick="startCamera()">
        Use Camera
      </button>

    </div>
  `;

  document.getElementById('fileInput').onchange = e => {

    const file = e.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = ev => {

      state.imageSrc = ev.target.result;
      state.mode = 'preview';

      render();
    };

    reader.readAsDataURL(file);
  };
}

// ─────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────

async function startCamera() {

  try {

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment'
      }
    });

    root.innerHTML = `
      <div class="panel">

        <video
          id="video"
          autoplay
          playsinline
          style="width:100%;border-radius:12px"
        ></video>

        <div style="height:12px"></div>

        <button class="btn btn-primary" onclick="capturePhoto()">
          Capture
        </button>

      </div>
    `;

    document.getElementById('video').srcObject = stream;

  } catch (err) {

    state.mode = 'error';
    state.error = 'Camera access denied';

    render();
  }
}

function capturePhoto() {

  const video = document.getElementById('video');

  const canvas = document.createElement('canvas');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext('2d');

  ctx.drawImage(video, 0, 0);

  state.imageSrc = canvas.toDataURL('image/jpeg');

  stream.getTracks().forEach(t => t.stop());

  state.mode = 'preview';

  render();
}

// ─────────────────────────────────────────────
// PREVIEW
// ─────────────────────────────────────────────

function renderPreview() {

  root.innerHTML = `
    <div class="panel">

      <img
        src="${state.imageSrc}"
        style="width:100%;border-radius:12px"
      >

      <div style="height:12px"></div>

      <button class="btn btn-primary" onclick="analyzeCard()">
        Analyze Card
      </button>

      <div style="height:12px"></div>

      <button class="btn btn-secondary" onclick="resetApp()">
        Cancel
      </button>

    </div>
  `;
}

// ─────────────────────────────────────────────
// LOADING
// ─────────────────────────────────────────────

function renderLoading() {

  root.innerHTML = `
    <div class="panel">
      <div style="text-align:center;padding:40px">
        Analyzing card...
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// ERROR
// ─────────────────────────────────────────────

function renderError() {

  root.innerHTML = `
    <div class="panel">

      <div style="color:#ff6b6b">
        ${state.error}
      </div>

      <div style="height:12px"></div>

      <button class="btn btn-primary" onclick="resetApp()">
        Back
      </button>

    </div>
  `;
}

// ─────────────────────────────────────────────
// ANALYZE
// ─────────────────────────────────────────────

async function analyzeCard() {

  state.mode = 'loading';

  render();

  try {

    const response = await fetch(
      'https://pokelens.onrender.com/analyze',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          image: state.imageSrc
        })
      }
    );

    const data = await response.json();

    state.result = data;

    state.mode = 'result';

    render();

  } catch (err) {

    state.error = err.message;

    state.mode = 'error';

    render();
  }
}

// ─────────────────────────────────────────────
// RESULT
// ─────────────────────────────────────────────

function renderResult() {

  const r = state.result;

  root.innerHTML = `
    <div class="panel">

      <img
        src="${state.imageSrc}"
        style="width:100%;border-radius:12px;margin-bottom:16px"
      >

      <div class="card-name">
        ${r.name || 'Unknown Card'}
      </div>

      <div class="card-meta">
        ${r.set || ''}
      </div>

      <div style="height:16px"></div>

      <div class="value-grid">

        <div class="value-cell">
          <div class="value-cell-label">Low</div>
          <div class="value-cell-num">
            $${Number(r.estimatedValue?.low || 0).toFixed(2)}
          </div>
        </div>

        <div class="value-cell">
          <div class="value-cell-label">Mid</div>
          <div class="value-cell-num">
            $${Number(r.estimatedValue?.mid || 0).toFixed(2)}
          </div>
        </div>

        <div class="value-cell">
          <div class="value-cell-label">High</div>
          <div class="value-cell-num">
            $${Number(r.estimatedValue?.high || 0).toFixed(2)}
          </div>
        </div>

      </div>

      <div style="height:16px"></div>

      <button class="btn btn-primary" onclick="saveToCollection()">
        Save To Collection
      </button>

      <div style="height:12px"></div>

      <button class="btn btn-secondary" onclick="resetApp()">
        Scan Another
      </button>

    </div>
  `;
}

// ─────────────────────────────────────────────
// SAVE COLLECTION
// ─────────────────────────────────────────────

function saveToCollection() {

  const r = state.result;

  const value = Number(r.estimatedValue?.mid || 0);

  collection.unshift({
    id: Date.now(),
    name: r.name,
    set: r.set,
    value,
    customValue: value,
    customGrade: r.grade || 'Near Mint',
    thumb: state.imageSrc,
    addedAt: new Date().toLocaleDateString(),
    priceHistory: [
      {
        date: new Date().toLocaleDateString(),
        value
      }
    ]
  });

  localStorage.setItem(
    'pokelens_collection',
    JSON.stringify(collection)
  );

  updatePortfolioHistory();

  updateCollectionCount();

  alert('Saved to collection!');
}

// ─────────────────────────────────────────────
// PORTFOLIO HISTORY
// ─────────────────────────────────────────────

function updatePortfolioHistory() {

  const total = collection.reduce((sum, c) => {
    return sum + Number(c.customValue || 0);
  }, 0);

  portfolioHistory.push({
    date: new Date().toLocaleDateString(),
    value: total
  });

  if (portfolioHistory.length > 90) {
    portfolioHistory.shift();
  }

  localStorage.setItem(
    'pokelens_portfolio_history',
    JSON.stringify(portfolioHistory)
  );
}

// ─────────────────────────────────────────────
// COLLECTION TAB
// ─────────────────────────────────────────────

function switchTab(tab) {

  const scanner = document.getElementById('root');
  const collectionRoot = document.getElementById('collection-root');

  if (tab === 'scanner') {

    scanner.style.display = '';
    collectionRoot.style.display = 'none';

    document.getElementById('tab-scanner').classList.add('active');
    document.getElementById('tab-collection').classList.remove('active');

  } else {

    scanner.style.display = 'none';
    collectionRoot.style.display = '';

    document.getElementById('tab-scanner').classList.remove('active');
    document.getElementById('tab-collection').classList.add('active');

    renderCollection();
  }
}

// ─────────────────────────────────────────────
// COLLECTION RENDER
// ─────────────────────────────────────────────

function renderCollection() {

  const el = document.getElementById('collection-root');

  const total = collection.reduce((sum, c) => {
    return sum + Number(c.customValue || 0);
  }, 0);

  el.innerHTML = `
    <div class="total-value-box">

      <div class="total-value-label">
        Total Collection Value
      </div>

      <div class="total-value-num">
        $${total.toFixed(2)}
      </div>

    </div>

    <div class="panel" style="margin-bottom:16px">

      <div class="section-label">
        Portfolio Analytics
      </div>

      <div style="height:280px">
        <canvas id="valuePieChart"></canvas>
      </div>

      <div style="height:280px;margin-top:24px">
        <canvas id="portfolioTrendChart"></canvas>
      </div>

    </div>

    <div class="collection-list">

      ${collection.map(card => `
        <div
          class="collection-item"
          onclick="openCardDetails(${card.id})"
          style="cursor:pointer"
        >

          <img
            src="${card.thumb}"
            class="collection-item-thumb"
          >

          <div class="collection-item-info">

            <div class="collection-item-name">
              ${card.name}
            </div>

            <div class="collection-item-meta">
              ${card.set}
            </div>

          </div>

          <div class="collection-item-value">
            $${Number(card.customValue).toFixed(2)}
          </div>

        </div>
      `).join('')}

    </div>
  `;

  renderCharts();
}

// ─────────────────────────────────────────────
// CHARTS
// ─────────────────────────────────────────────

function renderCharts() {

  const pie = document.getElementById('valuePieChart');

  if (pie) {

    new Chart(pie, {
      type: 'pie',
      data: {
        labels: collection.map(c => c.name),
        datasets: [{
          data: collection.map(c => c.customValue)
        }]
      }
    });
  }

  const line = document.getElementById('portfolioTrendChart');

  if (line) {

    new Chart(line, {
      type: 'line',
      data: {
        labels: portfolioHistory.map(h => h.date),
        datasets: [{
          label: 'Portfolio Value',
          data: portfolioHistory.map(h => h.value),
          tension: 0.3
        }]
      }
    });
  }
}

// ─────────────────────────────────────────────
// CARD DETAILS
// ─────────────────────────────────────────────

function openCardDetails(id) {

  const card = collection.find(c => c.id === id);

  if (!card) return;

  closeCardDetails();

  const modal = document.createElement('div');

  modal.id = 'card-detail-modal';

  modal.style.cssText = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:9999;
    overflow:auto;
    padding:20px;
  `;

  modal.innerHTML = `
    <div class="panel" style="max-width:700px;margin:40px auto">

      <div style="display:flex;justify-content:space-between">

        <div>
          <div class="card-name">${card.name}</div>
          <div class="card-meta">${card.set}</div>
        </div>

        <button class="btn btn-secondary" onclick="closeCardDetails()" style="width:auto">
          Close
        </button>

      </div>

      <div style="height:16px"></div>

      <img
        src="${card.thumb}"
        style="width:220px;border-radius:12px"
      >

      <div style="height:20px"></div>

      <div class="section-label">
        Condition
      </div>

      <select id="edit-grade" class="btn btn-secondary">
        <option>Mint</option>
        <option>Near Mint</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Played</option>
        <option>Poor</option>
      </select>

      <div style="height:16px"></div>

      <div class="section-label">
        Manual Value
      </div>

      <input
        id="edit-value"
        type="number"
        value="${card.customValue}"
        class="btn btn-secondary"
      >

      <div style="height:24px"></div>

      <div style="height:280px">
        <canvas id="cardTrendChart"></canvas>
      </div>

      <div style="height:20px"></div>

      <button class="btn btn-primary" onclick="saveCardEdits(${card.id})">
        Save Changes
      </button>

    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById('edit-grade').value =
    card.customGrade;

  renderCardTrendChart(card);
}

// ─────────────────────────────────────────────
// CLOSE MODAL
// ─────────────────────────────────────────────

function closeCardDetails() {

  const modal = document.getElementById(
    'card-detail-modal'
  );

  if (modal) modal.remove();
}

// ─────────────────────────────────────────────
// SAVE CARD EDITS
// ─────────────────────────────────────────────

function saveCardEdits(id) {

  const card = collection.find(c => c.id === id);

  if (!card) return;

  card.customGrade =
    document.getElementById('edit-grade').value;

  card.customValue = Number(
    document.getElementById('edit-value').value || 0
  );

  card.priceHistory.push({
    date: new Date().toLocaleDateString(),
    value: card.customValue
  });

  localStorage.setItem(
    'pokelens_collection',
    JSON.stringify(collection)
  );

  updatePortfolioHistory();

  closeCardDetails();

  renderCollection();
}

// ─────────────────────────────────────────────
// CARD TREND CHART
// ─────────────────────────────────────────────

function renderCardTrendChart(card) {

  const canvas = document.getElementById(
    'cardTrendChart'
  );

  if (!canvas) return;

  new Chart(canvas, {
    type: 'line',
    data: {
      labels: card.priceHistory.map(p => p.date),
      datasets: [{
        label: card.name,
        data: card.priceHistory.map(p => p.value),
        tension: 0.35
      }]
    }
  });
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

function updateCollectionCount() {

  const el = document.getElementById(
    'collection-count'
  );

  if (el) {
    el.textContent = collection.length
      ? `(${collection.length})`
      : '';
  }
}

function resetApp() {

  state = {
    mode: 'idle',
    imageSrc: null,
    result: null,
    error: null
  };

  render();
}
</script>
