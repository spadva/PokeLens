<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let collection = JSON.parse(localStorage.getItem('pokelens_collection') || '[]');
let portfolioHistory = JSON.parse(localStorage.getItem('pokelens_portfolio_history') || '[]');

function updateCollectionCount() {
  const el = document.getElementById('collection-count');
  if (el) {
    el.textContent = collection.length ? `(${collection.length})` : '';
  }
}

function switchTab(tab) {
  const scanner = document.getElementById('root');
  const collectionView = document.getElementById('collection-root');

  if (tab === 'scanner') {
    scanner.style.display = 'block';
    collectionView.style.display = 'none';

    document.getElementById('tab-scanner').classList.add('active');
    document.getElementById('tab-collection').classList.remove('active');
  } else {
    scanner.style.display = 'none';
    collectionView.style.display = 'block';

    document.getElementById('tab-scanner').classList.remove('active');
    document.getElementById('tab-collection').classList.add('active');

    renderCollection();
  }
}

function saveCollection() {
  localStorage.setItem(
    'pokelens_collection',
    JSON.stringify(collection)
  );
}

function saveToCollection(card, img) {
  const value = Number(card.estimatedValue?.mid || 0);

  collection.unshift({
    id: Date.now(),
    name: card.name,
    set: card.set,
    grade: card.grade,
    customGrade: card.grade,
    value: value,
    customValue: value,
    thumb: img,
    priceHistory: [
      {
        date: new Date().toLocaleDateString(),
        value: value
      }
    ]
  });

  saveCollection();
  updateCollectionCount();
}

function removeFromCollection(id) {
  collection = collection.filter(c => c.id !== id);

  saveCollection();

  renderCollection();
}

function renderCollection() {
  const root = document.getElementById('collection-root');

  const total = collection.reduce((sum, c) => {
    return sum + Number(c.customValue || 0);
  }, 0);

  root.innerHTML = `
    <div class="panel">

      <div class="total-value-box">
        <div class="total-value-label">
          Total Collection Value
        </div>

        <div class="total-value-num">
          $${total.toFixed(2)}
        </div>
      </div>

      <div style="height:300px;margin-bottom:2rem">
        <canvas id="pieChart"></canvas>
      </div>

      <div class="collection-list">
        ${
          collection.map(card => `
            <div
              class="collection-item"
              onclick="openCard(${card.id})"
              style="cursor:pointer"
            >

              ${
                card.thumb
                  ? `<img src="${card.thumb}" class="collection-item-thumb">`
                  : ''
              }

              <div class="collection-item-info">
                <div class="collection-item-name">
                  ${card.name}
                </div>

                <div class="collection-item-meta">
                  ${card.set} · ${card.customGrade}
                </div>
              </div>

              <div class="collection-item-value">
                $${Number(card.customValue).toFixed(2)}
              </div>

              <button
                class="collection-item-delete"
                onclick="event.stopPropagation();removeFromCollection(${card.id})"
              >
                ✕
              </button>

            </div>
          `).join('')
        }
      </div>

    </div>
  `;

  renderPieChart();
}

function renderPieChart() {
  const canvas = document.getElementById('pieChart');

  if (!canvas) return;

  new Chart(canvas, {
    type: 'pie',

    data: {
      labels: collection.map(c => c.name),

      datasets: [{
        data: collection.map(c => Number(c.customValue || 0))
      }]
    },

    options: {
      responsive: true,

      plugins: {
        legend: {
          labels: {
            color: '#fff'
          }
        }
      }
    }
  });
}

function openCard(id) {
  const card = collection.find(c => c.id === id);

  if (!card) return;

  const modal = document.createElement('div');

  modal.id = 'card-modal';

  modal.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:9999;
    overflow:auto;
    padding:2rem;
  `;

  modal.innerHTML = `
    <div
      style="
        max-width:700px;
        margin:auto;
        background:#111118;
        border-radius:16px;
        padding:24px;
      "
    >

      <div
        style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          margin-bottom:1rem;
        "
      >
        <h2>${card.name}</h2>

        <button
          onclick="closeCard()"
          style="
            background:none;
            border:none;
            color:white;
            font-size:28px;
            cursor:pointer;
          "
        >
          ✕
        </button>
      </div>

      ${
        card.thumb
          ? `<img
              src="${card.thumb}"
              style="
                width:220px;
                border-radius:12px;
                margin-bottom:1rem;
              "
            >`
          : ''
      }

      <div style="margin-bottom:1rem">
        <label>Condition</label>

        <select
          id="edit-grade"
          style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            background:#1a1a24;
            color:white;
            border:1px solid rgba(255,255,255,0.1);
          "
        >
          <option>Mint</option>
          <option>Near Mint</option>
          <option>Excellent</option>
          <option>Good</option>
          <option>Played</option>
          <option>Poor</option>
        </select>
      </div>

      <div style="margin-bottom:1rem">
        <label>Manual Value</label>

        <input
          id="edit-value"
          type="number"
          value="${card.customValue}"
          style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            background:#1a1a24;
            color:white;
            border:1px solid rgba(255,255,255,0.1);
          "
        >
      </div>

      <div style="height:260px;margin-bottom:2rem">
        <canvas id="trendChart"></canvas>
      </div>

      <button
        class="btn btn-primary"
        onclick="saveCard(${card.id})"
      >
        Save Changes
      </button>

    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById('edit-grade').value =
    card.customGrade;

  setTimeout(() => {
    renderTrendChart(card);
  }, 100);
}

function closeCard() {
  const modal = document.getElementById('card-modal');

  if (modal) modal.remove();
}

function saveCard(id) {
  const card = collection.find(c => c.id === id);

  if (!card) return;

  card.customGrade =
    document.getElementById('edit-grade').value;

  card.customValue =
    Number(document.getElementById('edit-value').value || 0);

  card.priceHistory.push({
    date: new Date().toLocaleDateString(),
    value: card.customValue
  });

  saveCollection();

  renderCollection();

  closeCard();
}

function renderTrendChart(card) {
  const canvas = document.getElementById('trendChart');

  if (!canvas) return;

  new Chart(canvas, {
    type: 'line',

    data: {
      labels: card.priceHistory.map(p => p.date),

      datasets: [{
        label: card.name,
        data: card.priceHistory.map(p => p.value),
        tension: 0.3
      }]
    },

    options: {
      responsive: true,

      scales: {
        x: {
          ticks: {
            color: '#fff'
          }
        },

        y: {
          ticks: {
            color: '#fff'
          }
        }
      },

      plugins: {
        legend: {
          labels: {
            color: '#fff'
          }
        }
      }
    }
  });
}

updateCollectionCount();
</script>
