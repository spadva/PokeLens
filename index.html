<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const root = document.getElementById('root');
const collectionRoot = document.getElementById('collection-root');

let collection =
  JSON.parse(localStorage.getItem('pokelens_collection') || '[]');

let portfolioHistory =
  JSON.parse(localStorage.getItem('pokelens_portfolio_history') || '[]');

function saveCollection() {
  localStorage.setItem(
    'pokelens_collection',
    JSON.stringify(collection)
  );

  updateCollectionCount();
}

function updateCollectionCount() {
  const el = document.getElementById('collection-count');

  if (el) {
    el.textContent =
      collection.length > 0
        ? `(${collection.length})`
        : '';
  }
}

function switchTab(tab) {
  const scanner = document.getElementById('root');
  const coll = document.getElementById('collection-root');

  const tabS = document.getElementById('tab-scanner');
  const tabC = document.getElementById('tab-collection');

  if (tab === 'scanner') {
    scanner.style.display = '';
    coll.style.display = 'none';

    tabS.classList.add('active');
    tabC.classList.remove('active');
  } else {
    scanner.style.display = 'none';
    coll.style.display = '';

    tabS.classList.remove('active');
    tabC.classList.add('active');

    renderCollection();
  }
}

function saveToCollection(card, img) {
  const value =
    Number(card.estimatedValue?.mid || 0);

  const item = {
    id: Date.now(),
    name: card.name,
    set: card.set,
    setNumber: card.setNumber,
    rarity: card.rarity,
    grade: card.grade,
    customGrade: card.grade,
    value: value,
    customValue: value,
    valueLow: Number(card.estimatedValue?.low || 0),
    valueHigh: Number(card.estimatedValue?.high || 0),
    thumb: img,
    notes: '',
    addedAt: new Date().toLocaleDateString(),
    priceHistory: [
      {
        date: new Date().toLocaleDateString(),
        value: value
      }
    ]
  };

  collection.unshift(item);

  updatePortfolioHistory();

  saveCollection();
}

function removeFromCollection(id) {
  collection =
    collection.filter(c => c.id !== id);

  saveCollection();

  renderCollection();
}

function updatePortfolioHistory() {
  const total =
    collection.reduce((sum, c) => {
      return sum + Number(c.customValue || 0);
    }, 0);

  portfolioHistory.push({
    date: new Date().toLocaleDateString(),
    value: total
  });

  if (portfolioHistory.length > 90) {
    portfolioHistory.shift();
  }

  localStorage.setItem(
    'pokelens_portfolio_history',
    JSON.stringify(portfolioHistory)
  );
}

function renderCollection() {
  const total =
    collection.reduce((sum, c) => {
      return sum + Number(c.customValue || 0);
    }, 0);

  collectionRoot.innerHTML = `

  <div class="panel" style="margin-bottom:1rem">

    <div class="total-value-box">
      <div class="total-value-label">
        Total Collection Value
      </div>

      <div class="total-value-num">
        $${total.toFixed(2)}
      </div>
    </div>

    <div style="height:280px;margin-bottom:2rem">
      <canvas id="pieChart"></canvas>
    </div>

    <div style="height:280px">
      <canvas id="lineChart"></canvas>
    </div>

  </div>

  ${
    collection.length === 0
      ? `
      <div class="empty-collection">
        No cards saved yet.
      </div>
      `
      : `
      <div class="collection-list">

      ${collection.map(card => `

        <div
          class="collection-item"
          onclick="openCardDetails(${card.id})"
          style="cursor:pointer"
        >

          ${
            card.thumb
              ? `<img
                  src="${card.thumb}"
                  class="collection-item-thumb"
                >`
              : ''
          }

          <div class="collection-item-info">
            <div class="collection-item-name">
              ${card.name}
            </div>

            <div class="collection-item-meta">
              ${card.set} · ${card.customGrade}
            </div>
          </div>

          <div class="collection-item-value">
            $${Number(card.customValue).toFixed(2)}
          </div>

          <button
            class="collection-item-delete"
            onclick="event.stopPropagation();removeFromCollection(${card.id})"
          >
            ✕
          </button>

        </div>

      `).join('')}

      </div>
      `
  }

  `;

  renderCharts();
}

function renderCharts() {

  const pieCanvas =
    document.getElementById('pieChart');

  const lineCanvas =
    document.getElementById('lineChart');

  if (!pieCanvas || !lineCanvas) return;

  new Chart(pieCanvas, {
    type: 'pie',

    data: {
      labels: collection.map(c => c.name),

      datasets: [{
        data: collection.map(c =>
          Number(c.customValue || 0)
        )
      }]
    },

    options: {
      responsive: true,

      plugins: {
        legend: {
          labels: {
            color: '#ffffff'
          }
        }
      }
    }
  });

  new Chart(lineCanvas, {
    type: 'line',

    data: {
      labels: portfolioHistory.map(h => h.date),

      datasets: [{
        label: 'Collection Value',

        data: portfolioHistory.map(h => h.value),

        tension: 0.3
      }]
    },

    options: {
      responsive: true,

      scales: {
        x: {
          ticks: {
            color: '#ffffff'
          }
        },

        y: {
          ticks: {
            color: '#ffffff'
          }
        }
      },

      plugins: {
        legend: {
          labels: {
            color: '#ffffff'
          }
        }
      }
    }
  });
}

function openCardDetails(id) {

  const card =
    collection.find(c => c.id === id);

  if (!card) return;

  const modal =
    document.createElement('div');

  modal.id = 'card-detail-modal';

  modal.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    overflow:auto;
    padding:2rem;
  `;

  modal.innerHTML = `

    <div
      style="
        max-width:700px;
        margin:auto;
        background:#111118;
        border-radius:16px;
        padding:24px;
      "
    >

      <div
        style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          margin-bottom:1rem;
        "
      >

        <h2>${card.name}</h2>

        <button
          onclick="closeCardDetails()"
          style="
            background:none;
            border:none;
            color:white;
            font-size:24px;
            cursor:pointer;
          "
        >
          ✕
        </button>

      </div>

      ${
        card.thumb
          ? `
          <img
            src="${card.thumb}"
            style="
              width:220px;
              border-radius:12px;
              margin-bottom:1rem;
            "
          >
          `
          : ''
      }

      <div style="margin-bottom:1rem">
        <label>Condition</label>

        <select
          id="edit-grade"
          style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            background:#1a1a24;
            color:white;
            border:1px solid rgba(255,255,255,0.1);
          "
        >
          <option>Mint</option>
          <option>Near Mint</option>
          <option>Excellent</option>
          <option>Good</option>
          <option>Played</option>
          <option>Poor</option>
        </select>
      </div>

      <div style="margin-bottom:1rem">
        <label>Manual Value</label>

        <input
          id="edit-value"
          type="number"
          value="${card.customValue}"
          style="
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            background:#1a1a24;
            color:white;
            border:1px solid rgba(255,255,255,0.1);
          "
        >
      </div>

      <div style="height:260px;margin-bottom:2rem">
        <canvas id="cardTrendChart"></canvas>
      </div>

      <button
        class="btn btn-primary"
        onclick="saveCardEdits(${card.id})"
      >
        Save Changes
      </button>

    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById('edit-grade').value =
    card.customGrade;

  setTimeout(() => {
    renderCardTrend(card);
  }, 100);
}

function closeCardDetails() {
  const modal =
    document.getElementById('card-detail-modal');

  if (modal) modal.remove();
}

function saveCardEdits(id) {

  const card =
    collection.find(c => c.id === id);

  if (!card) return;

  card.customGrade =
    document.getElementById('edit-grade').value;

  card.customValue =
    Number(
      document.getElementById('edit-value').value || 0
    );

  card.priceHistory.push({
    date: new Date().toLocaleDateString(),
    value: card.customValue
  });

  saveCollection();

  updatePortfolioHistory();

  closeCardDetails();

  renderCollection();
}

function renderCardTrend(card) {

  const canvas =
    document.getElementById('cardTrendChart');

  if (!canvas) return;

  new Chart(canvas, {

    type: 'line',

    data: {
      labels:
        card.priceHistory.map(p => p.date),

      datasets: [{
        label: card.name,

        data:
          card.priceHistory.map(p => p.value),

        tension: 0.3
      }]
    },

    options: {
      responsive: true,

      scales: {
        x: {
          ticks: {
            color: '#ffffff'
          }
        },

        y: {
          ticks: {
            color: '#ffffff'
          }
        }
      },

      plugins: {
        legend: {
          labels: {
            color: '#ffffff'
          }
        }
      }
    }
  });
}

updateCollectionCount();
</script>
